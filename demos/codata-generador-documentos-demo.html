<!DOCTYPE html>
<html lang="es-CL">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de Documentos · Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --accent:#7C3AED;--accent-2:#A855F7;--accent-ink:#fff;--wa:#25D366;
    --ink:#16131F;--muted:#7E7689;--line:#EAE5F0;--surface:#F6F3FB;--card:#fff;
    --display:"Bricolage Grotesque",system-ui,sans-serif;--body:"Inter",system-ui,sans-serif;--mono:"JetBrains Mono",monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--body);color:var(--ink);background:var(--surface);-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,textarea{font-family:inherit}
  .shell{max-width:980px;margin:0 auto;padding:24px 20px 50px}
  .top{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
  .logo{display:flex;align-items:center;gap:11px}
  .logo .m{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:grid;place-items:center;color:#fff;font-family:var(--display);font-weight:800;font-size:18px}
  .logo b{font-family:var(--display);font-size:20px;display:block;line-height:1}.logo span{font-size:11.5px;color:var(--muted)}
  .controls{margin-left:auto;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .ti{height:36px;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:0 11px;font-size:13px;width:120px;outline:none}
  .swatches{display:flex;gap:6px}.sw{width:22px;height:22px;border-radius:999px;border:2px solid transparent}.sw.active{border-color:var(--ink);transform:scale(1.1)}
  .lead{margin:0 0 16px}.lead h1{font-family:var(--display);font-weight:800;font-size:clamp(22px,3vw,30px);letter-spacing:-.02em;margin:0 0 4px}
  .lead p{font-size:14px;color:var(--muted);margin:0;max-width:58ch}
  .grid{display:grid;grid-template-columns:340px 1fr;gap:18px;align-items:start}
  @media(max-width:780px){.grid{grid-template-columns:1fr}}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:0 6px 22px rgba(20,18,30,.05)}
  .types{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
  .type{border:1px solid var(--line);border-radius:11px;padding:12px 10px;text-align:center;font-size:12.5px;font-weight:600;transition:.12s}
  .type:hover{border-color:var(--accent)}.type.on{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 8%,transparent)}
  .type .e{font-size:20px;display:block;margin-bottom:4px}
  .fld{margin-bottom:12px}.fld label{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:6px}
  .fld input,.fld textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:13.5px;outline:none}
  .fld input:focus,.fld textarea:focus{border-color:var(--accent)}.fld textarea{min-height:64px;resize:vertical;line-height:1.5}
  .btn{height:48px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;font-weight:700;font-size:14px;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;transition:filter .15s}
  .btn:hover{filter:brightness(1.06)}.btn:disabled{opacity:.5}
  .btn svg{width:16px;height:16px;fill:none;stroke:#fff;stroke-width:1.9}
  .doc{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:0 6px 22px rgba(20,18,30,.05);min-height:420px;display:flex;flex-direction:column}
  .dh{padding:13px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
  .dh b{font-family:var(--display);font-size:15px}.dh .acts{display:flex;gap:8px}
  .dh .acts button{font-size:12px;font-weight:600;border:1px solid var(--line);border-radius:8px;padding:6px 11px}
  .dh .acts .wa{background:var(--wa);color:#fff;border-color:transparent}
  .paper{flex:1;padding:24px;font-size:13.5px;line-height:1.65;white-space:pre-wrap;overflow-y:auto;color:#23202B;font-family:Georgia,serif}
  .empty{color:var(--muted);text-align:center;padding:60px 24px;font-size:13.5px;font-family:var(--body)}
  .skel{height:13px;background:linear-gradient(90deg,var(--surface),var(--line),var(--surface));background-size:200% 100%;border-radius:6px;animation:sh 1.2s infinite;margin-bottom:10px}@keyframes sh{to{background-position:-200% 0}}
  .credit{text-align:center;font-size:12px;color:var(--muted);margin-top:22px}
</style>
</head>
<body>
<div class="shell">
  <div class="top">
    <div class="logo"><div class="m" id="lm">D</div><div><b id="bl">Docu</b><span>Generador de documentos · demo</span></div></div>
    <div class="controls"><input class="ti" id="ib" value="Docu" maxlength="16"><div class="swatches" id="sw"></div></div>
  </div>
  <div class="lead"><h1>Documentos profesionales en segundos</h1>
    <p>Elige el tipo, pon los datos clave y la IA redacta el documento listo para enviar. Adiós a partir de una hoja en blanco.</p></div>

  <div class="grid">
    <div class="panel">
      <div class="types" id="types"></div>
      <div class="fld"><label id="l1">Para</label><input id="f1" placeholder=""></div>
      <div class="fld"><label id="l2">Asunto / objeto</label><input id="f2" placeholder=""></div>
      <div class="fld"><label>Detalles clave</label><textarea id="f3" placeholder="Datos, montos, condiciones, contexto…"></textarea></div>
      <button class="btn" id="go"><svg viewBox="0 0 24 24"><path d="M12 3l2.2 5.8L20 11l-5.8 2.2L12 19l-2.2-5.8L4 11l5.8-2.2z"/></svg> Generar documento</button>
    </div>
    <div class="doc">
      <div class="dh"><b id="docTitle">Documento</b><div class="acts"><button id="copy">Copiar</button><button id="dl">⬇ Descargar</button><button class="wa" id="wa">WhatsApp</button></div></div>
      <div class="paper" id="paper"><div class="empty">Tu documento aparecerá aquí ✍️</div></div>
    </div>
  </div>
  <div class="credit">Demo interactiva · solución re-skineable · IA real</div>
</div>

<script>
(function(){
  "use strict";
  function $(s){return document.querySelector(s);}
  var brand="Docu";
  var types=[
    {e:"📄",n:"Cotización",l1:"Cliente",l2:"Servicio / producto"},
    {e:"📝",n:"Contrato simple",l1:"Contraparte",l2:"Objeto del contrato"},
    {e:"✉️",n:"Carta formal",l1:"Destinatario",l2:"Motivo"},
    {e:"📊",n:"Informe",l1:"Dirigido a",l2:"Tema del informe"}
  ];
  var sel=0,docText="";

  function renderTypes(){$("#types").innerHTML=types.map(function(t,i){return '<button class="type'+(i===sel?" on":"")+'" data-i="'+i+'"><span class="e">'+t.e+'</span>'+t.n+'</button>';}).join("");
    [].slice.call($("#types").querySelectorAll(".type")).forEach(function(b){b.onclick=function(){sel=+b.dataset.i;renderTypes();labels();};});}
  function labels(){$("#l1").textContent=types[sel].l1;$("#l2").textContent=types[sel].l2;}

  $("#go").onclick=function(){
    var t=types[sel];$("#go").disabled=true;$("#docTitle").textContent=t.n;
    $("#paper").innerHTML='<div class="skel" style="width:50%;height:18px;margin-bottom:16px"></div><div class="skel"></div><div class="skel" style="width:95%"></div><div class="skel" style="width:88%"></div><div class="skel" style="width:70%;margin-top:14px"></div>';
    var sys="Eres asistente que redacta documentos comerciales en español de Chile, formales y bien estructurados. Genera un "+t.n+" completo y profesional con los datos entregados. Incluye encabezado, cuerpo y cierre apropiados. Si faltan datos, usa placeholders entre [corchetes]. Responde solo el documento, sin comentarios.";
    var usr=t.l1+": "+($("#f1").value||"[—]")+"\n"+t.l2+": "+($("#f2").value||"[—]")+"\nDetalles: "+($("#f3").value||"[—]")+"\nEmisor: "+brand;
    fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,system:sys,messages:[{role:"user",content:usr}]})
    }).then(function(r){return r.json();}).then(function(d){
      var t2="";if(d&&d.content)t2=d.content.filter(function(i){return i.type==="text";}).map(function(i){return i.text;}).join("").trim();
      docText=t2.replace(/```/g,"").trim();$("#paper").textContent=docText||"No se pudo generar.";
    }).catch(function(){$("#paper").innerHTML='<div class="empty">No se pudo generar ahora. Reintenta.</div>';}).then(function(){$("#go").disabled=false;});
  };
  $("#copy").onclick=function(){if(docText)navigator.clipboard&&navigator.clipboard.writeText(docText);};
  $("#dl").onclick=function(){if(!docText)return;var b=new Blob([docText],{type:"text/plain"}),u=URL.createObjectURL(b),a=document.createElement("a");a.href=u;a.download=types[sel].n+".txt";document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(u);};
  $("#wa").onclick=function(){if(docText)window.open("https://wa.me/?text="+encodeURIComponent(docText),"_blank");};

  var SW=[{c:"#7C3AED",c2:"#A855F7"},{c:"#2563EB",c2:"#5B8DEF"},{c:"#0D9488",c2:"#2DD4BF"},{c:"#C2410C",c2:"#EA7A3C"},{c:"#BE185D",c2:"#EC4899"}];
  function ac(o){document.documentElement.style.setProperty("--accent",o.c);document.documentElement.style.setProperty("--accent-2",o.c2);
    var h=o.c.replace("#",""),r=parseInt(h.substr(0,2),16),g=parseInt(h.substr(2,2),16),b=parseInt(h.substr(4,2),16);
    document.documentElement.style.setProperty("--accent-ink",(0.299*r+0.587*g+0.114*b)>150?"#16131F":"#fff");
    [].slice.call(document.querySelectorAll(".sw")).forEach(function(e){e.classList.toggle("active",e.dataset.c===o.c);});}
  function bsw(){var s=$("#sw");s.innerHTML="";SW.forEach(function(o){var b=document.createElement("button");b.className="sw";b.style.background=o.c;b.dataset.c=o.c;b.onclick=function(){ac(o);};s.appendChild(b);});}
  function ab(n){brand=n||"Marca";$("#bl").textContent=brand;$("#lm").textContent=brand.charAt(0).toUpperCase();}
  $("#ib").addEventListener("input",function(e){ab(e.target.value);});
  bsw();ac(SW[0]);ab("Docu");renderTypes();labels();
})();
</script>
</body>
</html>
