<!DOCTYPE html>
<html lang="es-CL">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gastos y Rendiciones · Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
<style>
  :root{
    --accent:#2A66C8;--accent-2:#4D8AE6;--accent-ink:#fff;--ok:#2E9E66;--warn:#E0A53B;
    --ink:#15191F;--muted:#737A86;--line:#E6E9F0;--surface:#F3F5F9;--card:#fff;
    --display:"Bricolage Grotesque",system-ui,sans-serif;--body:"Inter",system-ui,sans-serif;--mono:"JetBrains Mono",monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--body);color:var(--ink);background:var(--surface);-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select{font-family:inherit}
  .shell{max-width:1000px;margin:0 auto;padding:24px 20px 50px}
  .top{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
  .logo{display:flex;align-items:center;gap:11px}
  .logo .m{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:grid;place-items:center;color:#fff;font-family:var(--display);font-weight:800;font-size:18px}
  .logo b{font-family:var(--display);font-size:20px;display:block;line-height:1}.logo span{font-size:11.5px;color:var(--muted)}
  .controls{margin-left:auto;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .ti{height:36px;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:0 11px;font-size:13px;width:120px;outline:none}
  .swatches{display:flex;gap:6px}.sw{width:22px;height:22px;border-radius:999px;border:2px solid transparent}.sw.active{border-color:var(--ink);transform:scale(1.1)}
  .lead{margin:0 0 16px}.lead h1{font-family:var(--display);font-weight:800;font-size:clamp(22px,3vw,30px);letter-spacing:-.02em;margin:0 0 4px}
  .lead p{font-size:14px;color:var(--muted);margin:0;max-width:58ch}
  .grid{display:grid;grid-template-columns:1fr 330px;gap:18px;align-items:start}
  @media(max-width:820px){.grid{grid-template-columns:1fr}}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:0 6px 22px rgba(20,18,30,.05)}
  .ph{padding:13px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
  .ph b{font-family:var(--display);font-size:15px}.ph .ct{font-size:11px;font-family:var(--mono);color:var(--muted)}
  .add{padding:14px 16px;border-bottom:1px solid var(--line);display:grid;grid-template-columns:1fr 1fr auto;gap:8px}
  .add input,.add select{height:42px;border:1px solid var(--line);border-radius:10px;padding:0 11px;font-size:13.5px;outline:none;background:var(--card)}
  .add input:focus,.add select:focus{border-color:var(--accent)}
  .add .glosa{grid-column:1/3}
  .add .photo{height:42px;border:1px dashed var(--line);border-radius:10px;font-size:12.5px;color:var(--muted);display:flex;align-items:center;justify-content:center;gap:6px}
  .add .photo.on{border-style:solid;border-color:var(--ok);color:var(--ok)}
  .add .photo svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8}
  .add .addb{grid-column:1/4;height:44px;border-radius:11px;background:var(--accent);color:#fff;font-weight:700;font-size:14px}
  .g{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line)}
  .g:last-child{border:none}
  .g .ico{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;flex:0 0 auto;font-size:17px}
  .g .inf{flex:1;min-width:0}.g .inf b{font-size:13.5px;display:block}.g .inf span{font-size:11px;color:var(--muted)}
  .g .pic{font-size:13px;color:var(--ok)}
  .g .amt{font-family:var(--mono);font-weight:700;font-size:13.5px}
  .g .rm{color:var(--muted);font-size:15px;padding:0 4px}.g .rm:hover{color:#D9534F}
  .sum{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:0 6px 22px rgba(20,18,30,.05)}
  .sum h3{font-family:var(--display);font-size:16px;margin:0 0 4px}
  .sum .tot{font-family:var(--display);font-weight:800;font-size:30px;margin:6px 0 16px;color:var(--accent)}
  .br{margin-bottom:12px}
  .br .l{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px}
  .br .t{height:8px;background:var(--surface);border-radius:999px;overflow:hidden}
  .br .f{height:100%;border-radius:999px;transition:width .5s}
  .btn{height:48px;border-radius:12px;background:var(--accent);color:#fff;font-weight:700;font-size:14px;width:100%;margin-top:6px;transition:filter .15s}
  .btn:hover{filter:brightness(1.06)}
  .sent{margin-top:12px;background:color-mix(in srgb,var(--ok) 10%,transparent);border:1px solid color-mix(in srgb,var(--ok) 30%,transparent);border-radius:12px;padding:12px 14px;font-size:13px;color:var(--ok);font-weight:600;display:none}
  .sent.on{display:block;animation:f .25s ease}@keyframes f{from{opacity:0}to{opacity:1}}
  .credit{text-align:center;font-size:12px;color:var(--muted);margin-top:22px}
</style>
</head>
<body>
<div class="shell">
  <div class="top">
    <div class="logo"><div class="m" id="lm">R</div><div><b id="bl">Rinde</b><span>Gastos y rendiciones · demo</span></div></div>
    <div class="controls"><input class="ti" id="ib" value="Rinde" maxlength="16"><div class="swatches" id="sw"></div></div>
  </div>
  <div class="lead"><h1>Rendiciones que cuadran solas</h1>
    <p>Carga cada gasto con su boleta, se clasifica y se suma. Tu rendición lista para enviar, sin pelear con boletas sueltas.</p></div>

  <div class="grid">
    <div class="panel">
      <div class="ph"><b>Gastos del período</b><span class="ct" id="ct">0 gastos</span></div>
      <div class="add">
        <input id="monto" type="number" placeholder="Monto $" inputmode="numeric">
        <select id="cat"></select>
        <button class="photo" id="photo"><svg viewBox="0 0 24 24"><path d="M4 7h3l2-2h6l2 2h3v12H4zM12 16a3.5 3.5 0 100-7 3.5 3.5 0 000 7z"/></svg> Boleta</button>
        <input class="glosa" id="glosa" placeholder="Glosa (ej: combustible camioneta)">
        <button class="addb" id="addb">Agregar gasto</button>
      </div>
      <div id="list"></div>
    </div>

    <div class="sum">
      <h3>Rendición</h3>
      <div class="tot" id="tot">$0</div>
      <div id="bars"></div>
      <button class="btn" id="send">Enviar a aprobación</button>
      <div class="sent" id="sentMsg"></div>
    </div>
  </div>
  <div class="credit">Demo interactiva · solución re-skineable · gastos de ejemplo</div>
</div>

<script>
(function(){
  "use strict";
  function $(s){return document.querySelector(s);}
  function clp(n){return "$"+Math.round(n).toLocaleString("es-CL");}
  var cats=[["Combustible","⛽","#E0742B"],["Insumos","📦","#2A66C8"],["Alimentación","🍔","#E0A53B"],["Peajes","🛣️","#7C3AED"],["Otros","🧾","#737A86"]];
  var gastos=[
    {monto:38000,cat:0,glosa:"Bencina camioneta",pic:true},
    {monto:24500,cat:1,glosa:"Tornillos y fijaciones",pic:true},
    {monto:12000,cat:2,glosa:"Almuerzo cuadrilla",pic:false}
  ];
  var photo=false;

  function catOpts(){$("#cat").innerHTML=cats.map(function(c,i){return '<option value="'+i+'">'+c[0]+'</option>';}).join("");}
  function render(){
    $("#ct").textContent=gastos.length+" gastos";
    $("#list").innerHTML=gastos.map(function(g,i){var c=cats[g.cat];
      return '<div class="g"><div class="ico" style="background:color-mix(in srgb,'+c[2]+' 14%,transparent)">'+c[1]+'</div><div class="inf"><b>'+g.glosa+'</b><span>'+c[0]+'</span></div>'+(g.pic?'<span class="pic" title="con boleta">📎</span>':'')+'<span class="amt">'+clp(g.monto)+'</span><button class="rm" data-rm="'+i+'">✕</button></div>';
    }).join("")||'<div style="padding:24px;text-align:center;color:var(--muted);font-size:13px">Sin gastos aún</div>';
    [].slice.call($("#list").querySelectorAll("[data-rm]")).forEach(function(b){b.onclick=function(){gastos.splice(+b.dataset.rm,1);render();};});
    summary();
  }
  function summary(){
    var tot=gastos.reduce(function(a,g){return a+g.monto;},0);
    $("#tot").textContent=clp(tot);
    $("#bars").innerHTML=cats.map(function(c,i){
      var s=gastos.filter(function(g){return g.cat===i;}).reduce(function(a,g){return a+g.monto;},0);
      if(!s)return"";
      var pct=tot?Math.round(s/tot*100):0;
      return '<div class="br"><div class="l"><span>'+c[1]+' '+c[0]+'</span><span>'+clp(s)+'</span></div><div class="t"><div class="f" style="width:'+pct+'%;background:'+c[2]+'"></div></div></div>';
    }).join("");
  }
  $("#photo").onclick=function(){photo=!photo;this.classList.toggle("on",photo);this.innerHTML=photo?'<svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg> Boleta lista':'<svg viewBox="0 0 24 24"><path d="M4 7h3l2-2h6l2 2h3v12H4zM12 16a3.5 3.5 0 100-7 3.5 3.5 0 000 7z"/></svg> Boleta';};
  $("#addb").onclick=function(){
    var m=parseInt($("#monto").value,10);if(!m){$("#monto").focus();return;}
    gastos.push({monto:m,cat:+$("#cat").value,glosa:$("#glosa").value||cats[+$("#cat").value][0],pic:photo});
    $("#monto").value="";$("#glosa").value="";photo=false;$("#photo").classList.remove("on");$("#photo").innerHTML='<svg viewBox="0 0 24 24"><path d="M4 7h3l2-2h6l2 2h3v12H4zM12 16a3.5 3.5 0 100-7 3.5 3.5 0 000 7z"/></svg> Boleta';
    render();
  };
  $("#send").onclick=function(){var t=$("#sentMsg");t.classList.add("on");t.textContent="✓ Rendición de "+gastos.length+" gastos enviada al aprobador.";};

  var SW=[{c:"#2A66C8",c2:"#4D8AE6"},{c:"#0D9488",c2:"#2DD4BF"},{c:"#7C3AED",c2:"#A855F7"},{c:"#C2410C",c2:"#EA7A3C"},{c:"#16161A",c2:"#444"}];
  function ac(o){document.documentElement.style.setProperty("--accent",o.c);document.documentElement.style.setProperty("--accent-2",o.c2);
    var h=o.c.replace("#",""),r=parseInt(h.substr(0,2),16),g=parseInt(h.substr(2,2),16),b=parseInt(h.substr(4,2),16);
    document.documentElement.style.setProperty("--accent-ink",(0.299*r+0.587*g+0.114*b)>150?"#15191F":"#fff");
    [].slice.call(document.querySelectorAll(".sw")).forEach(function(e){e.classList.toggle("active",e.dataset.c===o.c);});}
  function bsw(){var s=$("#sw");s.innerHTML="";SW.forEach(function(o){var b=document.createElement("button");b.className="sw";b.style.background=o.c;b.dataset.c=o.c;b.onclick=function(){ac(o);};s.appendChild(b);});}
  function ab(n){$("#bl").textContent=n||"Marca";$("#lm").textContent=(n||"M").charAt(0).toUpperCase();}
  $("#ib").addEventListener("input",function(e){ab(e.target.value);});
  bsw();ac(SW[0]);ab("Rinde");catOpts();render();
})();
</script>
</body>
</html>
