<!DOCTYPE html>
<html lang="es-CL">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configurador 3D · Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
<style>
  :root{
    --accent:#0D9488;--accent-2:#2DD4BF;--accent-ink:#04201C;--wa:#25D366;
    --prod:#0D9488;--prod-d:#0A6F66;--prod-l:#14B8A6;
    --ink:#E9F2F0;--muted:#84988F;--line:#21302C;--card:#13201C;--bg:#08120F;
    --display:"Bricolage Grotesque",system-ui,sans-serif;--body:"Inter",system-ui,sans-serif;--mono:"JetBrains Mono",monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--body);color:var(--ink);
    background:radial-gradient(85% 60% at 50% 0%,color-mix(in srgb,var(--accent) 22%,transparent),transparent 58%),var(--bg);
    min-height:100vh;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input{font-family:inherit}
  .shell{max-width:980px;margin:0 auto;padding:24px 20px 50px}
  .top{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
  .logo{display:flex;align-items:center;gap:11px}
  .logo .m{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:grid;place-items:center;color:var(--accent-ink);font-family:var(--display);font-weight:800;font-size:18px}
  .logo b{font-family:var(--display);font-size:20px;color:#fff;display:block;line-height:1}.logo span{font-size:11.5px;color:var(--muted)}
  .controls{margin-left:auto;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .ti{height:36px;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:0 11px;font-size:13px;width:120px;outline:none;color:#fff}
  .swatches{display:flex;gap:6px}.sw{width:22px;height:22px;border-radius:999px;border:2px solid transparent}.sw.active{border-color:#fff;transform:scale(1.1)}
  .grid{display:grid;grid-template-columns:1fr 340px;gap:20px;align-items:start}
  @media(max-width:760px){.grid{grid-template-columns:1fr}}
  .stage3d{background:var(--card);border:1px solid var(--line);border-radius:20px;height:380px;display:grid;place-items:center;perspective:900px;overflow:hidden;position:relative;cursor:grab}
  .stage3d:active{cursor:grabbing}
  .hint{position:absolute;bottom:12px;left:0;right:0;text-align:center;font-size:11.5px;color:var(--muted)}
  .scene{transform-style:preserve-3d;transition:transform .1s linear}
  .cube{position:relative;width:150px;height:150px;transform-style:preserve-3d}
  .face{position:absolute;width:150px;height:150px;display:grid;place-items:center;font-size:46px;border:2px solid rgba(255,255,255,.12);border-radius:10px;backface-visibility:visible}
  .f-front{background:var(--prod);transform:translateZ(75px)}
  .f-back{background:var(--prod-d);transform:rotateY(180deg) translateZ(75px)}
  .f-right{background:var(--prod-l);transform:rotateY(90deg) translateZ(75px)}
  .f-left{background:var(--prod-d);transform:rotateY(-90deg) translateZ(75px)}
  .f-top{background:var(--prod-l);transform:rotateX(90deg) translateZ(75px)}
  .f-bottom{background:var(--prod-d);transform:rotateX(-90deg) translateZ(75px)}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px}
  .panel h2{font-family:var(--display);font-weight:800;font-size:19px;margin:0 0 2px;color:#fff}
  .panel .desc{font-size:12.5px;color:var(--muted);margin-bottom:16px}
  .opt{margin-bottom:16px}
  .opt .l{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-bottom:9px}
  .colors{display:flex;gap:9px}
  .col{width:34px;height:34px;border-radius:10px;border:2px solid transparent;cursor:pointer}.col.on{border-color:#fff;transform:scale(1.1)}
  .seg{display:flex;gap:7px}
  .seg button{flex:1;height:40px;border:1px solid var(--line);border-radius:10px;font-size:13px;font-weight:600;color:var(--muted)}
  .seg button.on{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
  .extras{display:flex;flex-direction:column;gap:8px}
  .ex{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:11px;padding:11px 13px;font-size:13.5px;cursor:pointer}
  .ex .ck{width:20px;height:20px;border-radius:6px;border:2px solid var(--line);flex:0 0 auto;display:grid;place-items:center}
  .ex.on{border-color:var(--accent)}.ex.on .ck{background:var(--accent);border-color:var(--accent)}.ex.on .ck::after{content:"✓";color:var(--accent-ink);font-size:12px;font-weight:700}
  .ex .pr{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--muted)}
  .price{display:flex;align-items:baseline;justify-content:space-between;margin:18px 0 12px;padding-top:14px;border-top:1px solid var(--line)}
  .price span{font-size:12px;color:var(--muted)}.price b{font-family:var(--display);font-weight:800;font-size:28px;color:#fff}
  .wabtn{height:50px;border-radius:13px;background:var(--wa);color:#fff;font-weight:700;font-size:15px;width:100%;display:flex;align-items:center;justify-content:center;gap:9px}
  .wabtn svg{width:18px;height:18px;fill:#fff}
  .credit{text-align:center;font-size:12px;color:var(--muted);margin-top:22px}
</style>
</head>
<body>
<div class="shell">
  <div class="top">
    <div class="logo"><div class="m" id="lm">F</div><div><b id="bl">Forma</b><span>Configurador 3D · demo</span></div></div>
    <div class="controls"><input class="ti" id="ib" value="Forma" maxlength="16"><div class="swatches" id="sw"></div></div>
  </div>

  <div class="grid">
    <div class="stage3d" id="stage">
      <div class="scene" id="scene"><div class="cube" id="cube">
        <div class="face f-front">📦</div><div class="face f-back">📦</div><div class="face f-right">✦</div>
        <div class="face f-left">✦</div><div class="face f-top">★</div><div class="face f-bottom"></div>
      </div></div>
      <div class="hint">Arrastra para girar · gira solo</div>
    </div>

    <div class="panel">
      <h2 id="pName">Producto configurable</h2>
      <div class="desc">Personaliza y mira el precio cambiar en vivo.</div>
      <div class="opt"><div class="l">Color</div><div class="colors" id="colors"></div></div>
      <div class="opt"><div class="l">Tamaño</div><div class="seg" id="sizes"></div></div>
      <div class="opt"><div class="l">Extras</div><div class="extras" id="extras"></div></div>
      <div class="price"><span>Precio final</span><b id="price">$0</b></div>
      <button class="wabtn" id="wa"><svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 00-8.6 15l-1.4 5 5.2-1.4A10 10 0 1012 2z"/></svg> Pedir esta configuración</button>
    </div>
  </div>
  <div class="credit">Demo interactiva · solución re-skineable · producto de ejemplo</div>
</div>

<script>
(function(){
  "use strict";
  function $(s){return document.querySelector(s);}
  function clp(n){return "$"+n.toLocaleString("es-CL");}
  var brand="Forma";
  var colors=[["#0D9488","Verde"],["#1D4ED8","Azul"],["#E0533D","Rojo"],["#E0A53B","Ámbar"],["#16161A","Negro"]];
  var sizes=[["S",0],["M",8000],["L",16000]];
  var extras=[["Grabado personalizado",12000,false],["Empaque regalo",6000,false],["Garantía extendida",9000,false]];
  var base=29990,selCol=0,selSize=1;

  function shade(hex,p){var h=hex.replace("#",""),r=parseInt(h.substr(0,2),16),g=parseInt(h.substr(2,2),16),b=parseInt(h.substr(4,2),16);
    r=Math.max(0,Math.min(255,r+p));g=Math.max(0,Math.min(255,g+p));b=Math.max(0,Math.min(255,b+p));
    return "#"+[r,g,b].map(function(x){return ("0"+x.toString(16)).slice(-2);}).join("");}
  function applyColor(){var c=colors[selCol][0];
    document.documentElement.style.setProperty("--prod",c);
    document.documentElement.style.setProperty("--prod-l",shade(c,28));
    document.documentElement.style.setProperty("--prod-d",shade(c,-34));}

  function buildColors(){$("#colors").innerHTML="";colors.forEach(function(c,i){var b=document.createElement("button");b.className="col"+(i===selCol?" on":"");b.style.background=c[0];b.onclick=function(){selCol=i;[].slice.call($("#colors").children).forEach(function(x){x.classList.remove("on");});b.classList.add("on");applyColor();price();};$("#colors").appendChild(b);});}
  function buildSizes(){$("#sizes").innerHTML="";sizes.forEach(function(s,i){var b=document.createElement("button");b.className=i===selSize?"on":"";b.textContent=s[0];b.onclick=function(){selSize=i;[].slice.call($("#sizes").children).forEach(function(x){x.classList.remove("on");});b.classList.add("on");price();};$("#sizes").appendChild(b);});}
  function buildExtras(){$("#extras").innerHTML="";extras.forEach(function(e,i){var b=document.createElement("button");b.className="ex"+(e[2]?" on":"");b.innerHTML='<span class="ck"></span>'+e[0]+'<span class="pr">+'+clp(e[1])+'</span>';b.onclick=function(){extras[i][2]=!extras[i][2];buildExtras();price();};$("#extras").appendChild(b);});}
  function total(){return base+sizes[selSize][1]+extras.reduce(function(a,e){return a+(e[2]?e[1]:0);},0);}
  function price(){$("#price").textContent=clp(total());}

  $("#wa").onclick=function(){
    var ex=extras.filter(function(e){return e[2];}).map(function(e){return e[0];}).join(", ")||"sin extras";
    window.open("https://wa.me/?text="+encodeURIComponent("Hola "+brand+", quiero este producto: color "+colors[selCol][1]+", tamaño "+sizes[selSize][0]+", extras: "+ex+". Total "+clp(total())+"."),"_blank");
  };

  // rotation
  var rx=-18,ry=20,auto=true,dragging=false,lx=0,ly=0;
  function tick(){if(auto&&!dragging)ry+=0.5;$("#scene").style.transform="rotateX("+rx+"deg) rotateY("+ry+"deg)";requestAnimationFrame(tick);}
  var st=$("#stage");
  function dn(e){dragging=true;auto=false;var t=e.touches?e.touches[0]:e;lx=t.clientX;ly=t.clientY;e.preventDefault();}
  function mv(e){if(!dragging)return;var t=e.touches?e.touches[0]:e;ry+=(t.clientX-lx)*0.5;rx-=(t.clientY-ly)*0.5;lx=t.clientX;ly=t.clientY;e.preventDefault();}
  function up(){dragging=false;setTimeout(function(){auto=true;},1500);}
  st.addEventListener("mousedown",dn);window.addEventListener("mousemove",mv);window.addEventListener("mouseup",up);
  st.addEventListener("touchstart",dn,{passive:false});st.addEventListener("touchmove",mv,{passive:false});st.addEventListener("touchend",up);

  var SW=[{c:"#0D9488",c2:"#2DD4BF",ink:"#04201C"},{c:"#5B6CFF",c2:"#8B7BF5",ink:"#fff"},{c:"#E5356B",c2:"#FF7BA3",ink:"#fff"},{c:"#EA580C",c2:"#F97A3D",ink:"#fff"},{c:"#2563EB",c2:"#5B8DEF",ink:"#fff"}];
  function ac(o){document.documentElement.style.setProperty("--accent",o.c);document.documentElement.style.setProperty("--accent-2",o.c2);document.documentElement.style.setProperty("--accent-ink",o.ink);
    [].slice.call(document.querySelectorAll(".sw")).forEach(function(e){e.classList.toggle("active",e.dataset.c===o.c);});}
  function bsw(){var s=$("#sw");s.innerHTML="";SW.forEach(function(o){var b=document.createElement("button");b.className="sw";b.style.background=o.c;b.dataset.c=o.c;b.onclick=function(){ac(o);};s.appendChild(b);});}
  function ab(n){brand=n||"Marca";$("#bl").textContent=brand;$("#lm").textContent=brand.charAt(0).toUpperCase();}
  $("#ib").addEventListener("input",function(e){ab(e.target.value);});
  bsw();ac(SW[0]);ab("Forma");buildColors();buildSizes();buildExtras();applyColor();price();tick();
})();
</script>
</body>
</html>
