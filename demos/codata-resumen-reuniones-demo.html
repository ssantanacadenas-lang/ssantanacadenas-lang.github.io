<!DOCTYPE html>
<html lang="es-CL">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resumen de Reuniones · Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --accent:#2563EB;--accent-2:#60A5FA;--accent-ink:#fff;--wa:#25D366;--ok:#22C55E;
    --ink:#101521;--muted:#6F7A8C;--line:#E4E8F0;--surface:#F2F5FA;--card:#fff;
    --display:"Bricolage Grotesque",system-ui,sans-serif;--body:"Inter",system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--body);color:var(--ink);background:var(--surface);-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  textarea,input{font-family:inherit}
  .shell{max-width:880px;margin:0 auto;padding:24px 20px 50px}
  .top{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
  .logo{display:flex;align-items:center;gap:11px}
  .logo .m{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:grid;place-items:center;color:#fff;font-family:var(--display);font-weight:800;font-size:18px}
  .logo b{font-family:var(--display);font-size:20px;display:block;line-height:1}.logo span{font-size:11.5px;color:var(--muted)}
  .controls{margin-left:auto;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .ti{height:36px;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:0 11px;font-size:13px;width:120px;outline:none}
  .swatches{display:flex;gap:6px}.sw{width:22px;height:22px;border-radius:999px;border:2px solid transparent}.sw.active{border-color:var(--ink);transform:scale(1.1)}
  .lead{margin:0 0 16px}.lead h1{font-family:var(--display);font-weight:800;font-size:clamp(22px,3vw,30px);letter-spacing:-.02em;margin:0 0 4px}
  .lead p{font-size:14px;color:var(--muted);margin:0;max-width:58ch}
  .io{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:flex-start}
  textarea{flex:1;min-width:240px;min-height:100px;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:13px;font-size:13px;outline:none;resize:vertical;line-height:1.5}
  textarea:focus{border-color:var(--accent)}
  .iob{display:flex;flex-direction:column;gap:8px}
  .btn{height:48px;padding:0 22px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;font-weight:700;font-size:14.5px;display:inline-flex;align-items:center;justify-content:center;gap:9px;transition:filter .15s}
  .btn:hover{filter:brightness(1.06)}.btn:disabled{opacity:.5}.btn svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:1.9}
  .btn-g{background:var(--card);border:1px solid var(--line);color:var(--ink);height:48px;padding:0 16px;border-radius:12px;font-size:13px;font-weight:600}
  .out{display:none}.out.on{display:block;animation:f .3s ease}@keyframes f{from{opacity:0;transform:translateY(8px)}to{opacity:1}}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:0 6px 22px rgba(20,18,30,.05);margin-bottom:14px}
  .ph{padding:13px 16px;border-bottom:1px solid var(--line);font-family:var(--display);font-size:15px;display:flex;align-items:center;gap:8px}
  .pb{padding:16px}
  .sum{font-size:14px;line-height:1.6}
  .li{display:flex;gap:9px;font-size:13.5px;line-height:1.45;padding:8px 0;border-bottom:1px solid var(--line)}.li:last-child{border:none}
  .task{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--line)}.task:last-child{border:none}
  .task .ck{width:20px;height:20px;border-radius:6px;border:2px solid var(--line);flex:0 0 auto}
  .task .t{flex:1;font-size:13.5px}.task .who{font-size:11px;font-weight:700;color:var(--accent);background:color-mix(in srgb,var(--accent) 10%,transparent);padding:3px 9px;border-radius:999px;white-space:nowrap}
  .skel{height:13px;background:linear-gradient(90deg,var(--surface),var(--line),var(--surface));background-size:200% 100%;border-radius:6px;animation:sh 1.2s infinite;margin-bottom:10px}@keyframes sh{to{background-position:-200% 0}}
  .acts{display:flex;gap:10px;margin-top:4px}
  .acts button{flex:1;height:46px;border-radius:12px;font-weight:700;font-size:14px}
  .acts .wa{background:var(--wa);color:#fff}.acts .cp{background:var(--card);border:1px solid var(--line)}
  .credit{text-align:center;font-size:12px;color:var(--muted);margin-top:22px}
</style>
</head>
<body>
<div class="shell">
  <div class="top">
    <div class="logo"><div class="m" id="lm">R</div><div><b id="bl">Resumo</b><span>Resumen de reuniones · demo</span></div></div>
    <div class="controls"><input class="ti" id="ib" value="Resumo" maxlength="16"><div class="swatches" id="sw"></div></div>
  </div>
  <div class="lead"><h1>De una reunión a un acta lista</h1>
    <p>Pega tus notas o la transcripción y la IA arma el resumen, los acuerdos y las tareas con responsable. Nada se pierde.</p></div>

  <div class="io">
    <textarea id="txt" spellcheck="false"></textarea>
    <div class="iob"><button class="btn-g" id="ex">Cargar ejemplo</button><button class="btn" id="go"><svg viewBox="0 0 24 24"><path d="M12 3l2.2 5.8L20 11l-5.8 2.2L12 19l-2.2-5.8L4 11l5.8-2.2z"/></svg> Resumir</button></div>
  </div>

  <div class="out" id="out">
    <div class="panel"><div class="ph">📌 Resumen</div><div class="pb sum" id="sum"></div></div>
    <div class="panel"><div class="ph">🤝 Acuerdos</div><div class="pb" id="acuerdos"></div></div>
    <div class="panel"><div class="ph">✅ Tareas</div><div class="pb" id="tareas"></div></div>
    <div class="acts"><button class="cp" id="copy">Copiar acta</button><button class="wa" id="wa">Enviar por WhatsApp</button></div>
  </div>
  <div class="credit">Demo interactiva · solución re-skineable · IA real</div>
</div>

<script>
(function(){
  "use strict";
  function $(s){return document.querySelector(s);}
  function esc(s){return String(s).replace(/[&<>]/g,function(m){return {"&":"&amp;","<":"&lt;",">":"&gt;"}[m];});}
  var example="Reunión de coordinación semanal. Asistieron Pedro, Camila y Diego.\nPedro dice que el cliente del proyecto norte pidió adelantar la entrega para el día 20. Camila comenta que faltan los materiales y que el proveedor no ha respondido. Se acuerda que Diego llama al proveedor mañana y Camila prepara una cotización alternativa. Pedro hablará con el cliente para ver si se puede dividir la entrega en dos. Quedó pendiente revisar el presupuesto actualizado la próxima semana.";
  $("#txt").value=example;$("#ex").onclick=function(){$("#txt").value=example;};
  var actaText="";

  $("#go").onclick=function(){
    var t=$("#txt").value.trim();if(!t){$("#txt").focus();return;}
    $("#go").disabled=true;$("#out").classList.add("on");
    $("#sum").innerHTML='<div class="skel"></div><div class="skel" style="width:80%"></div>';$("#acuerdos").innerHTML='<div class="skel" style="width:90%"></div>';$("#tareas").innerHTML='<div class="skel" style="width:85%"></div>';
    var sys="Eres asistente que ordena reuniones. Lee las notas y responde SOLO JSON válido sin markdown, forma exacta:\n"+
      '{"resumen":"...","acuerdos":["..."],"tareas":[{"t":"...","who":"..."}]}\n'+
      "resumen: 2-3 frases. acuerdos: decisiones tomadas. tareas: acción + responsable (who). Si no hay responsable claro, pon 'Por asignar'. Español de Chile.";
    fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,system:sys,messages:[{role:"user",content:t}]})
    }).then(function(r){return r.json();}).then(function(d){
      var raw="";if(d&&d.content)raw=d.content.filter(function(i){return i.type==="text";}).map(function(i){return i.text;}).join("").trim();
      raw=raw.replace(/```json|```/g,"").trim();show(JSON.parse(raw));
    }).catch(function(){$("#sum").textContent="No se pudo resumir ahora. Reintenta.";}).then(function(){$("#go").disabled=false;});
  };
  function show(o){
    $("#sum").textContent=o.resumen||"";
    $("#acuerdos").innerHTML=(o.acuerdos||[]).map(function(x){return '<div class="li">🤝 '+esc(x)+'</div>';}).join("")||"—";
    $("#tareas").innerHTML=(o.tareas||[]).map(function(x){return '<div class="task"><span class="ck"></span><span class="t">'+esc(x.t)+'</span><span class="who">'+esc(x.who||"Por asignar")+'</span></div>';}).join("")||"—";
    actaText="ACTA DE REUNIÓN\n\nRESUMEN:\n"+(o.resumen||"")+"\n\nACUERDOS:\n"+(o.acuerdos||[]).map(function(x){return "- "+x;}).join("\n")+"\n\nTAREAS:\n"+(o.tareas||[]).map(function(x){return "- "+x.t+" ("+(x.who||"Por asignar")+")";}).join("\n");
  }
  $("#copy").onclick=function(){if(actaText)navigator.clipboard&&navigator.clipboard.writeText(actaText);};
  $("#wa").onclick=function(){if(actaText)window.open("https://wa.me/?text="+encodeURIComponent(actaText),"_blank");};

  var SW=[{c:"#2563EB",c2:"#60A5FA"},{c:"#0D9488",c2:"#2DD4BF"},{c:"#7C3AED",c2:"#A855F7"},{c:"#C2410C",c2:"#EA7A3C"},{c:"#16161A",c2:"#444"}];
  function ac(o){document.documentElement.style.setProperty("--accent",o.c);document.documentElement.style.setProperty("--accent-2",o.c2);
    var h=o.c.replace("#",""),r=parseInt(h.substr(0,2),16),g=parseInt(h.substr(2,2),16),b=parseInt(h.substr(4,2),16);
    document.documentElement.style.setProperty("--accent-ink",(0.299*r+0.587*g+0.114*b)>150?"#101521":"#fff");
    [].slice.call(document.querySelectorAll(".sw")).forEach(function(e){e.classList.toggle("active",e.dataset.c===o.c);});}
  function bsw(){var s=$("#sw");s.innerHTML="";SW.forEach(function(o){var b=document.createElement("button");b.className="sw";b.style.background=o.c;b.dataset.c=o.c;b.onclick=function(){ac(o);};s.appendChild(b);});}
  function ab(n){$("#bl").textContent=n||"Marca";$("#lm").textContent=(n||"M").charAt(0).toUpperCase();}
  $("#ib").addEventListener("input",function(e){ab(e.target.value);});
  bsw();ac(SW[0]);ab("Resumo");
})();
</script>
</body>
</html>
