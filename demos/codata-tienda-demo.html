<!DOCTYPE html>
<html lang="es-CL">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda Premium · Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
<style>
  :root{
    --accent:#0F172A;--accent-2:#334155;--accent-ink:#fff;--wa:#25D366;--gold:#C9A24B;
    --ink:#11151C;--muted:#737A86;--line:#E7E9EE;--surface:#F4F5F8;--card:#fff;
    --display:"Bricolage Grotesque",system-ui,sans-serif;--body:"Inter",system-ui,sans-serif;--mono:"JetBrains Mono",monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--body);color:var(--ink);background:var(--surface);-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input{font-family:inherit}
  .shell{max-width:1080px;margin:0 auto;padding:24px 20px 50px}
  .top{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
  .logo{display:flex;align-items:center;gap:11px}
  .logo .m{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:grid;place-items:center;color:#fff;font-family:var(--display);font-weight:800;font-size:18px}
  .logo b{font-family:var(--display);font-size:20px;display:block;line-height:1}.logo span{font-size:11.5px;color:var(--muted)}
  .controls{margin-left:auto;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .ti{height:36px;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:0 11px;font-size:13px;width:120px;outline:none}
  .swatches{display:flex;gap:6px}.sw{width:22px;height:22px;border-radius:999px;border:2px solid transparent}.sw.active{border-color:var(--ink);transform:scale(1.1)}
  .hero{background:linear-gradient(135deg,var(--accent),var(--accent-2));border-radius:18px;padding:26px;color:#fff;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;transition:background .35s}
  .hero h1{font-family:var(--display);font-weight:800;font-size:clamp(22px,3.2vw,30px);letter-spacing:-.02em;margin:0 0 4px}
  .hero p{font-size:13.5px;opacity:.9;margin:0}
  .hero .cartbtn{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.25);border-radius:12px;padding:11px 16px;font-weight:700;font-size:14px;display:flex;align-items:center;gap:9px;position:relative}
  .hero .cartbtn .n{position:absolute;top:-8px;right:-8px;background:var(--gold);color:#1a1407;font-size:11px;font-weight:800;width:22px;height:22px;border-radius:999px;display:grid;place-items:center}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .chip{height:34px;padding:0 14px;border-radius:999px;border:1px solid var(--line);background:var(--card);font-size:13px;font-weight:600;color:var(--muted)}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  @media(max-width:780px){.grid{grid-template-columns:1fr 1fr}}
  @media(max-width:480px){.grid{grid-template-columns:1fr}}
  .prod{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;display:flex;flex-direction:column;transition:.2s}
  .prod:hover{transform:translateY(-3px);box-shadow:0 20px 44px rgba(20,18,30,.1)}
  .prod .th{height:130px;display:grid;place-items:center;font-size:50px}
  .prod .b{padding:14px;display:flex;flex-direction:column;gap:5px;flex:1}
  .prod .cat{font-size:10.5px;font-weight:700;letter-spacing:.05em;color:var(--muted);text-transform:uppercase}
  .prod h3{font-size:14.5px;margin:0;line-height:1.2}
  .prod .pr{font-family:var(--display);font-weight:800;font-size:17px;margin-top:2px}
  .prod .add{margin-top:auto;height:40px;border-radius:10px;background:var(--accent);color:#fff;font-weight:700;font-size:13px;transition:filter .15s}
  .prod .add:hover{filter:brightness(1.15)}
  /* cart drawer */
  .ov{position:fixed;inset:0;background:rgba(17,21,28,.5);display:none;z-index:50}.ov.on{display:block}
  .drawer{position:fixed;top:0;right:0;bottom:0;width:380px;max-width:92vw;background:var(--card);box-shadow:-20px 0 60px rgba(0,0,0,.2);display:flex;flex-direction:column;transform:translateX(100%);transition:.25s}
  .ov.on .drawer{transform:translateX(0)}
  .dh{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:between;gap:10px}
  .dh b{font-family:var(--display);font-size:17px;flex:1}.dh .x{font-size:20px;color:var(--muted)}
  .ditems{flex:1;overflow-y:auto;padding:12px 20px}
  .citem{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--line)}
  .citem .e{font-size:26px}.citem .i{flex:1}.citem .i b{font-size:13.5px;display:block}.citem .i span{font-size:11.5px;color:var(--muted);font-family:var(--mono)}
  .citem .q{display:flex;align-items:center;gap:7px}.citem .q button{width:26px;height:26px;border-radius:7px;border:1px solid var(--line);font-weight:700}
  .citem .q .n{font-family:var(--mono);font-weight:700;min-width:16px;text-align:center;font-size:13px}
  .dempty{text-align:center;color:var(--muted);font-size:13.5px;padding:50px 20px}
  .df{padding:18px 20px;border-top:1px solid var(--line)}
  .df .tot{display:flex;justify-content:space-between;font-family:var(--display);font-weight:800;font-size:20px;margin-bottom:12px}
  .wabtn{height:50px;border-radius:13px;background:var(--wa);color:#fff;font-weight:700;font-size:15px;width:100%;display:flex;align-items:center;justify-content:center;gap:9px}
  .wabtn svg{width:18px;height:18px;fill:#fff}.wabtn:disabled{opacity:.45}
  .credit{text-align:center;font-size:12px;color:var(--muted);margin-top:22px}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-size:13px;font-weight:600;padding:11px 18px;border-radius:999px;opacity:0;pointer-events:none;transition:.25s;z-index:60}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="shell">
  <div class="top">
    <div class="logo"><div class="m" id="lm">V</div><div><b id="bl">Vértice</b><span>Tienda online · demo</span></div></div>
    <div class="controls"><input class="ti" id="ib" value="Vértice" maxlength="16"><div class="swatches" id="sw"></div></div>
  </div>

  <div class="hero">
    <div><h1 id="bizName">Vértice</h1><p>Compra online y recibe en tu casa · despacho en 24h</p></div>
    <button class="cartbtn" id="openCart">🛒 Carrito<span class="n" id="cartN" style="display:none">0</span></button>
  </div>

  <div class="filters" id="filters"></div>
  <div class="grid" id="grid"></div>
  <div class="credit">Demo interactiva · solución re-skineable · productos de ejemplo</div>
</div>

<div class="ov" id="ov"><div class="drawer">
  <div class="dh"><b>Tu carrito</b><button class="x" id="closeCart">✕</button></div>
  <div class="ditems" id="ditems"></div>
  <div class="df">
    <div class="tot"><span>Total</span><span id="dtot">$0</span></div>
    <button class="wabtn" id="checkout" disabled><svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 00-8.6 15l-1.4 5 5.2-1.4A10 10 0 1012 2z"/></svg> Comprar por WhatsApp</button>
  </div>
</div></div>
<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";
  function $(s){return document.querySelector(s);}
  function clp(n){return "$"+n.toLocaleString("es-CL");}
  var brand="Vértice";
  var cats=["Todos","Tecnología","Hogar","Accesorios"];
  var prods=[
    {c:"Tecnología",e:"🎧",n:"Audífonos inalámbricos",p:39990,hue:"#2563EB"},
    {c:"Tecnología",e:"⌚",n:"Smartwatch deportivo",p:54990,hue:"#0D9488"},
    {c:"Hogar",e:"🕯️",n:"Set aromas premium",p:18990,hue:"#C2410C"},
    {c:"Hogar",e:"☕",n:"Cafetera compacta",p:74990,hue:"#7C3AED"},
    {c:"Accesorios",e:"🎒",n:"Mochila urbana",p:34990,hue:"#0F172A"},
    {c:"Accesorios",e:"🕶️",n:"Lentes de sol",p:24990,hue:"#E0A53B"},
    {c:"Tecnología",e:"🔌",n:"Cargador rápido",p:14990,hue:"#2563EB"},
    {c:"Hogar",e:"🪴",n:"Maceta diseño",p:12990,hue:"#0D9488"},
    {c:"Accesorios",e:"⌨️",n:"Teclado mecánico",p:49990,hue:"#0F172A"}
  ];
  var filter="Todos",cart={};

  function filters(){$("#filters").innerHTML="";cats.forEach(function(c){var b=document.createElement("button");b.className="chip"+(filter===c?" on":"");b.textContent=c;b.onclick=function(){filter=c;filters();grid();};$("#filters").appendChild(b);});}
  function grid(){
    $("#grid").innerHTML=prods.filter(function(p){return filter==="Todos"||p.c===filter;}).map(function(p){var i=prods.indexOf(p);
      return '<article class="prod"><div class="th" style="background:color-mix(in srgb,'+p.hue+' 14%,#fff)">'+p.e+'</div><div class="b"><span class="cat">'+p.c+'</span><h3>'+p.n+'</h3><div class="pr">'+clp(p.p)+'</div><button class="add" data-i="'+i+'">Agregar</button></div></article>';
    }).join("");
    [].slice.call($("#grid").querySelectorAll(".add")).forEach(function(b){b.onclick=function(){var i=b.dataset.i;cart[i]=(cart[i]||0)+1;updateCart();toast("Agregado al carrito 🛒");};});
  }
  function updateCart(){
    var n=Object.keys(cart).reduce(function(a,k){return a+cart[k];},0);
    $("#cartN").textContent=n;$("#cartN").style.display=n?"grid":"none";
    var keys=Object.keys(cart);
    if(!keys.length){$("#ditems").innerHTML='<div class="dempty">Tu carrito está vacío 🛒</div>';$("#checkout").disabled=true;$("#dtot").textContent="$0";return;}
    var tot=0;
    $("#ditems").innerHTML=keys.map(function(k){var p=prods[k];tot+=p.p*cart[k];
      return '<div class="citem"><span class="e">'+p.e+'</span><div class="i"><b>'+p.n+'</b><span>'+clp(p.p)+'</span></div><div class="q"><button data-m="-1" data-k="'+k+'">−</button><span class="n">'+cart[k]+'</span><button data-m="1" data-k="'+k+'">+</button></div></div>';
    }).join("");
    $("#dtot").textContent=clp(tot);$("#checkout").disabled=false;
    [].slice.call($("#ditems").querySelectorAll("[data-m]")).forEach(function(b){b.onclick=function(){var k=b.dataset.k;cart[k]+=+b.dataset.m;if(cart[k]<=0)delete cart[k];updateCart();};});
  }
  function toast(m){var t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove("show");},1500);}
  $("#openCart").onclick=function(){$("#ov").classList.add("on");};
  $("#closeCart").onclick=function(){$("#ov").classList.remove("on");};
  $("#ov").onclick=function(e){if(e.target===$("#ov"))$("#ov").classList.remove("on");};
  $("#checkout").onclick=function(){
    var keys=Object.keys(cart),tot=0;var det=keys.map(function(k){tot+=prods[k].p*cart[k];return cart[k]+"× "+prods[k].n;}).join(", ");
    window.open("https://wa.me/?text="+encodeURIComponent("Hola "+brand+", quiero comprar: "+det+". Total "+clp(tot)+"."),"_blank");
  };

  var SW=[{c:"#0F172A",c2:"#334155"},{c:"#2563EB",c2:"#5B8DEF"},{c:"#0D9488",c2:"#2DD4BF"},{c:"#7C3AED",c2:"#A855F7"},{c:"#C2410C",c2:"#EA7A3C"}];
  function ac(o){document.documentElement.style.setProperty("--accent",o.c);document.documentElement.style.setProperty("--accent-2",o.c2);
    var h=o.c.replace("#",""),r=parseInt(h.substr(0,2),16),g=parseInt(h.substr(2,2),16),b=parseInt(h.substr(4,2),16);
    document.documentElement.style.setProperty("--accent-ink",(0.299*r+0.587*g+0.114*b)>150?"#11151C":"#fff");
    [].slice.call(document.querySelectorAll(".sw")).forEach(function(e){e.classList.toggle("active",e.dataset.c===o.c);});}
  function bsw(){var s=$("#sw");s.innerHTML="";SW.forEach(function(o){var b=document.createElement("button");b.className="sw";b.style.background=o.c;b.dataset.c=o.c;b.onclick=function(){ac(o);};s.appendChild(b);});}
  function ab(n){brand=n||"Marca";$("#bl").textContent=brand;$("#lm").textContent=brand.charAt(0).toUpperCase();$("#bizName").textContent=brand;}
  $("#ib").addEventListener("input",function(e){ab(e.target.value);});
  bsw();ac(SW[0]);ab("Vértice");filters();grid();updateCart();
})();
</script>
</body>
</html>
