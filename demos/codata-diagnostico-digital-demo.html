<!DOCTYPE html>
<html lang="es-CL">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico Digital · Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --accent:#4F46E5;--accent-2:#7C6FF0;--accent-ink:#fff;--wa:#25D366;--ok:#22C55E;--warn:#E0A53B;--bad:#EF4444;
    --ink:#E9EAF6;--muted:#8A8FA8;--line:#262A40;--card:#161A2C;--bg:#0B0D1A;
    --display:"Bricolage Grotesque",system-ui,sans-serif;--body:"Inter",system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--body);color:var(--ink);
    background:radial-gradient(85% 60% at 50% 0%,color-mix(in srgb,var(--accent) 22%,transparent),transparent 58%),var(--bg);
    min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 18px 50px;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input{font-family:inherit}
  .top{width:100%;max-width:600px;display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
  .logo{display:flex;align-items:center;gap:11px}
  .logo .m{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:grid;place-items:center;color:#fff;font-family:var(--display);font-weight:800;font-size:17px}
  .logo b{font-family:var(--display);font-size:19px;color:#fff;display:block;line-height:1}.logo span{font-size:11.5px;color:var(--muted)}
  .controls{margin-left:auto;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .ti{height:36px;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:0 11px;font-size:13px;width:120px;outline:none;color:#fff}
  .swatches{display:flex;gap:6px}.sw{width:22px;height:22px;border-radius:999px;border:2px solid transparent}.sw.active{border-color:#fff;transform:scale(1.1)}
  .card{width:100%;max-width:600px;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:28px 26px;box-shadow:0 24px 60px rgba(0,0,0,.4)}
  .card h2{font-family:var(--display);font-weight:800;font-size:22px;margin:0 0 4px;color:#fff}
  .card .sub{font-size:13.5px;color:var(--muted);margin:0 0 22px}
  .prog{display:flex;gap:6px;margin-bottom:20px}.prog i{height:4px;flex:1;border-radius:999px;background:var(--line)}.prog i.on{background:var(--accent)}
  .q .ql{font-size:16px;font-weight:600;margin-bottom:16px;color:#fff}
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{border:1px solid var(--line);border-radius:13px;padding:14px;font-size:14px;text-align:left;transition:.12s;color:var(--ink)}
  .opt:hover{border-color:var(--accent)}.opt.on{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 12%,transparent)}
  .nav{display:flex;gap:10px;margin-top:20px}
  .btn{height:50px;border-radius:13px;font-weight:700;font-size:15px;flex:1;display:flex;align-items:center;justify-content:center;gap:8px;transition:filter .15s}
  .btn-p{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff}.btn-p:hover{filter:brightness(1.08)}.btn-p:disabled{opacity:.45}
  .btn-g{background:transparent;border:1px solid var(--line);color:var(--ink);flex:0 0 auto;padding:0 18px}
  .step{display:none}.step.on{display:block;animation:f .25s ease}@keyframes f{from{opacity:0;transform:translateY(8px)}to{opacity:1}}
  .result .ring{position:relative;width:140px;height:140px;margin:0 auto 8px}
  .result .ring svg{width:140px;height:140px;transform:rotate(-90deg)}
  .result .ring .pc{position:absolute;inset:0;display:grid;place-items:center;text-align:center}
  .result .ring .pc b{font-family:var(--display);font-weight:800;font-size:36px;line-height:1;color:#fff}.result .ring .pc span{font-size:11px;color:var(--muted)}
  .result h2,.result .sub{text-align:center}
  .block{margin-top:18px}.block .bl{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  .li{display:flex;gap:10px;font-size:13.5px;line-height:1.45;padding:8px 0;border-bottom:1px solid var(--line)}.li:last-child{border:none}
  .li .ic{flex:0 0 auto}
  .reco{display:flex;gap:11px;padding:11px;border:1px solid var(--line);border-radius:12px;margin-bottom:9px}
  .reco .pri{font-size:10px;font-weight:700;padding:3px 8px;border-radius:999px;height:fit-content;white-space:nowrap}
  .pri.alta{background:color-mix(in srgb,var(--bad) 18%,transparent);color:#FCA5A5}
  .pri.media{background:color-mix(in srgb,var(--warn) 18%,transparent);color:#FCD34D}
  .pri.win{background:color-mix(in srgb,var(--ok) 16%,transparent);color:#86EFAC}
  .reco .tx b{font-size:13.5px;display:block;color:#fff}.reco .tx span{font-size:12.5px;color:var(--muted)}
  .skel{height:14px;background:linear-gradient(90deg,var(--card),var(--line),var(--card));background-size:200% 100%;border-radius:6px;animation:sh 1.2s infinite;margin-bottom:11px}@keyframes sh{to{background-position:-200% 0}}
  .wabtn{height:50px;border-radius:13px;background:var(--wa);color:#fff;font-weight:700;font-size:15px;width:100%;display:flex;align-items:center;justify-content:center;gap:9px;margin-top:18px}
  .wabtn svg{width:18px;height:18px;fill:#fff}
  .credit{font-size:12px;color:var(--muted);margin-top:18px;text-align:center}
</style>
</head>
<body>
  <div class="top">
    <div class="logo"><div class="m" id="lm">N</div><div><b id="bl">Nivela</b><span>Diagnóstico digital · demo</span></div></div>
    <div class="controls"><input class="ti" id="ib" value="Nivela" maxlength="16"><div class="swatches" id="sw"></div></div>
  </div>

  <div class="card">
    <div class="prog" id="prog"></div>
    <div id="quiz"></div>
    <div class="step" id="loading">
      <h2>Analizando tu negocio…</h2><div class="sub">La IA está armando tu diagnóstico</div>
      <div class="skel" style="width:60%;height:20px;margin:18px 0"></div><div class="skel" style="width:100%"></div><div class="skel" style="width:90%"></div><div class="skel" style="width:80%"></div>
    </div>
    <div class="step result" id="result"></div>
  </div>
  <div class="credit">Demo interactiva · solución re-skineable · IA real</div>

<script>
(function(){
  "use strict";
  function $(s){return document.querySelector(s);}
  function esc(s){return String(s).replace(/[&<>]/g,function(m){return {"&":"&amp;","<":"&lt;",">":"&gt;"}[m];});}
  var brand="Nivela";
  var Q=[
    {q:"¿Cómo reciben hoy a sus clientes nuevos?",o:["Solo de boca en boca","Redes sociales","Web + redes","Web, redes y publicidad"]},
    {q:"¿Cómo agendan o toman pedidos?",o:["Por teléfono / papel","WhatsApp manual","Planilla o app","Sistema automático"]},
    {q:"¿Tienen forma de cotizar rápido?",o:["No, demora días","A mano cada vez","Plantilla","Cotizador automático"]},
    {q:"¿Miden resultados (ventas, clientes)?",o:["No medimos","En la cabeza","Planilla","Dashboard en vivo"]},
    {q:"¿Cómo es su presencia digital?",o:["Casi nula","Solo Instagram","Web básica","Web pro + reseñas"]}
  ];
  var ans=[],step=0;

  function prog(){$("#prog").innerHTML=Q.map(function(_,i){return '<i class="'+(i<=step?"on":"")+'"></i>';}).join("");}
  function renderQ(){
    prog();
    $("#quiz").innerHTML='<div class="step on"><h2>Diagnóstico en 5 preguntas</h2><div class="sub">Pregunta '+(step+1)+' de '+Q.length+'</div><div class="q"><div class="ql">'+Q[step].q+'</div><div class="opts">'+
      Q[step].o.map(function(o,i){return '<button class="opt'+(ans[step]===i?" on":"")+'" data-i="'+i+'">'+o+'</button>';}).join("")+
      '</div></div><div class="nav">'+(step>0?'<button class="btn btn-g" id="back">‹</button>':'')+'<button class="btn btn-p" id="next" '+(ans[step]==null?"disabled":"")+'>'+(step===Q.length-1?"Ver diagnóstico":"Siguiente")+'</button></div></div>';
    [].slice.call($("#quiz").querySelectorAll(".opt")).forEach(function(b){b.onclick=function(){ans[step]=+b.dataset.i;renderQ();};});
    var nx=$("#next");if(nx)nx.onclick=function(){if(step<Q.length-1){step++;renderQ();}else run();};
    var bk=$("#back");if(bk)bk.onclick=function(){step--;renderQ();};
  }

  function run(){
    $("#quiz").innerHTML="";$("#loading").classList.add("on");prog();
    var score=Math.round(ans.reduce(function(a,v){return a+v;},0)/(Q.length*3)*100);
    var resumen=Q.map(function(q,i){return q.q+" → "+q.o[ans[i]];}).join("\n");
    var sys="Eres consultor de transformación digital para pymes. Con las respuestas de un diagnóstico, responde SOLO JSON válido sin markdown, forma exacta:\n"+
      '{"nivel":"...","resumen":"...","brechas":["...","..."],"recomendaciones":[{"pri":"alta|media|win","t":"...","d":"..."}]}\n'+
      "nivel: una palabra (Inicial/Básico/Intermedio/Avanzado). resumen: 2 frases. brechas: 3 puntos débiles concretos. recomendaciones: 4 acciones, cada una con pri (alta=importante, media, win=quick win fácil), t=título corto, d=beneficio en 1 frase. Español de Chile, concreto.";
    (function(){
      var niv=score<35?"Inicial":score<55?"Básico":score<75?"Intermedio":"Avanzado";
      var AR=[
        {b:"La captación depende del boca a boca: sin canal propio, el flujo de clientes nuevos no es controlable.",r:{pri:"alta",t:"Presencia digital que capta",d:"Web propia con botón directo a WhatsApp: lo encuentran y le escriben en un clic."}},
        {b:"La agenda y los pedidos se llevan a mano: horas perdidas, errores y dependencia de una sola persona.",r:{pri:"alta",t:"Agenda y pedidos automáticos",d:"El cliente reserva o pide solo, con confirmación y recordatorio sin intervención."}},
        {b:"Cotizar demora: cada día de espera es una venta que se enfría o se va al competidor.",r:{pri:"win",t:"Cotizador automático",d:"Cotización profesional con su marca en un minuto, con seguimiento incluido."}},
        {b:"No hay medición confiable: se decide a ciegas, sin saber qué funciona y qué no.",r:{pri:"media",t:"Panel de control en vivo",d:"Ventas, pedidos y clientes en una sola pantalla, desde el celular."}},
        {b:"La presencia digital es débil: quien lo busca en Google no encuentra razones para elegirlo.",r:{pri:"media",t:"Reputación 5★ automática",d:"Cada cliente satisfecho deja su reseña en Google con un toque."}}];
      var idx=[];for(var i2=0;i2<Q.length;i2++)idx.push(i2);
      idx.sort(function(a2,b2){return ans[a2]-ans[b2];});
      var brechas=[],recs=[];
      for(var j2=0;j2<idx.length&&brechas.length<3;j2++){if(ans[idx[j2]]<=2)brechas.push(AR[idx[j2]].b);}
      var j3=0;while(brechas.length<3){if(brechas.indexOf(AR[idx[j3]].b)<0)brechas.push(AR[idx[j3]].b);j3++;}
      for(var k2=0;k2<idx.length&&recs.length<4;k2++)recs.push(AR[idx[k2]].r);
      var resumen2=niv==="Avanzado"?"Su operación está sobre la media: lo que queda es automatizar los últimos procesos manuales. Las siguientes acciones convierten esa ventaja en distancia.":"Su negocio funciona, pero varios procesos clave siguen siendo manuales. La buena noticia: cada brecha detectada tiene una solución concreta y de rápida implementación.";
      setTimeout(function(){show(score,{nivel:niv,resumen:resumen2,brechas:brechas,recomendaciones:recs});},900+Math.random()*700);
    })();
  }
  function show(score,o){
    $("#loading").classList.remove("on");
    var col=score>=70?"var(--ok)":score>=40?"var(--warn)":"var(--bad)";
    var ic={alta:"🔴",media:"🟡",win:"⚡"};
    $("#result").classList.add("on");
    $("#result").innerHTML=
      '<div class="ring"><svg viewBox="0 0 140 140"><circle cx="70" cy="70" r="60" fill="none" stroke="var(--line)" stroke-width="12"/><circle cx="70" cy="70" r="60" fill="none" stroke="'+col+'" stroke-width="12" stroke-linecap="round" stroke-dasharray="377" stroke-dashoffset="'+(377*(1-score/100))+'" style="transition:stroke-dashoffset 1s"/></svg><div class="pc"><b>'+score+'</b><span>de 100</span></div></div>'+
      '<h2>Madurez digital: '+esc(o.nivel||"")+'</h2><div class="sub">'+esc(o.resumen||"")+'</div>'+
      '<div class="block"><div class="bl">Brechas detectadas</div>'+(o.brechas||[]).map(function(x){return '<div class="li"><span class="ic">⚠️</span>'+esc(x)+'</div>';}).join("")+'</div>'+
      '<div class="block"><div class="bl">Plan recomendado</div>'+(o.recomendaciones||[]).map(function(r){return '<div class="reco"><span class="pri '+(r.pri||"media")+'">'+(ic[r.pri]||"")+' '+(r.pri==="win"?"Quick win":r.pri==="alta"?"Prioritario":"Medio")+'</span><div class="tx"><b>'+esc(r.t||"")+'</b><span>'+esc(r.d||"")+'</span></div></div>';}).join("")+'</div>'+
      '<button class="wabtn" id="wa"><svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 00-8.6 15l-1.4 5 5.2-1.4A10 10 0 1012 2z"/></svg> Quiero avanzar con esto</button>';
    $("#wa").onclick=function(){window.open("https://wa.me/?text="+encodeURIComponent("Hola "+brand+", hice el diagnóstico digital (puntaje "+score+"/100) y quiero avanzar con el plan."),"_blank");};
  }

  var SW=[{c:"#4F46E5",c2:"#7C6FF0"},{c:"#0D9488",c2:"#2DD4BF"},{c:"#2563EB",c2:"#5B8DEF"},{c:"#C2410C",c2:"#EA7A3C"},{c:"#BE185D",c2:"#EC4899"}];
  function ac(o){document.documentElement.style.setProperty("--accent",o.c);document.documentElement.style.setProperty("--accent-2",o.c2);
    var h=o.c.replace("#",""),r=parseInt(h.substr(0,2),16),g=parseInt(h.substr(2,2),16),b=parseInt(h.substr(4,2),16);
    document.documentElement.style.setProperty("--accent-ink",(0.299*r+0.587*g+0.114*b)>150?"#0B0D1A":"#fff");
    [].slice.call(document.querySelectorAll(".sw")).forEach(function(e){e.classList.toggle("active",e.dataset.c===o.c);});}
  function bsw(){var s=$("#sw");s.innerHTML="";SW.forEach(function(o){var b=document.createElement("button");b.className="sw";b.style.background=o.c;b.dataset.c=o.c;b.onclick=function(){ac(o);};s.appendChild(b);});}
  function ab(n){brand=n||"Marca";$("#bl").textContent=brand;$("#lm").textContent=brand.charAt(0).toUpperCase();}
  $("#ib").addEventListener("input",function(e){ab(e.target.value);});
  bsw();ac(SW[0]);ab("Nivela");renderQ();
})();
</script>
<a id="cdBack" href="../index.html" onclick="if(history.length>1){history.back();return false;}" style="position:fixed;top:12px;left:12px;z-index:99999;display:inline-flex;align-items:center;gap:6px;background:rgba(10,10,14,.8);color:#fff;border:1px solid rgba(255,255,255,.38);border-radius:999px;padding:9px 15px;font:600 12px/1 system-ui,-apple-system,sans-serif;text-decoration:none;backdrop-filter:blur(6px);box-shadow:0 6px 20px rgba(0,0,0,.4)">← Volver</a>
</body>
</html>
