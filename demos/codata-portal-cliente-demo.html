<!DOCTYPE html>
<html lang="es-CL">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal de Cliente · Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
<style>
  :root{
    --accent:#0F766E;--accent-2:#14B8A6;--accent-ink:#fff;--wa:#25D366;--ok:#16A34A;--warn:#E0A53B;
    --ink:#121A19;--muted:#6F7B79;--line:#E3ECEA;--surface:#F1F7F6;--card:#fff;
    --display:"Bricolage Grotesque",system-ui,sans-serif;--body:"Inter",system-ui,sans-serif;--mono:"JetBrains Mono",monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--body);color:var(--ink);background:var(--surface);-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}input{font-family:inherit}
  .shell{max-width:920px;margin:0 auto;padding:24px 20px 50px}
  .top{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
  .logo{display:flex;align-items:center;gap:11px}
  .logo .m{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:grid;place-items:center;color:#fff;font-family:var(--display);font-weight:800;font-size:18px}
  .logo b{font-family:var(--display);font-size:20px;display:block;line-height:1}.logo span{font-size:11.5px;color:var(--muted)}
  .controls{margin-left:auto;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .ti{height:36px;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:0 11px;font-size:13px;width:120px;outline:none}
  .swatches{display:flex;gap:6px}.sw{width:22px;height:22px;border-radius:999px;border:2px solid transparent}.sw.active{border-color:var(--ink);transform:scale(1.1)}
  .welcome{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;border-radius:18px;padding:22px 24px;margin-bottom:16px;transition:background .35s}
  .welcome .hi{font-size:13px;opacity:.9}.welcome h1{font-family:var(--display);font-weight:800;font-size:clamp(20px,3vw,26px);margin:2px 0 0}
  .grid{display:grid;grid-template-columns:1fr 320px;gap:16px;align-items:start}
  @media(max-width:760px){.grid{grid-template-columns:1fr}}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:0 6px 22px rgba(20,18,30,.05);margin-bottom:16px}
  .ph{padding:13px 16px;border-bottom:1px solid var(--line);font-family:var(--display);font-size:15px}
  .pb{padding:16px}
  .steps{display:flex;flex-direction:column;gap:0}
  .stp{display:flex;gap:13px;position:relative;padding-bottom:18px}
  .stp:last-child{padding-bottom:0}
  .stp .dot{width:26px;height:26px;border-radius:999px;border:2px solid var(--line);display:grid;place-items:center;font-size:13px;flex:0 0 auto;background:var(--card);z-index:1}
  .stp.done .dot{background:var(--ok);border-color:var(--ok);color:#fff}
  .stp.cur .dot{background:var(--accent);border-color:var(--accent);color:#fff}
  .stp::before{content:"";position:absolute;left:12px;top:26px;bottom:0;width:2px;background:var(--line)}
  .stp:last-child::before{display:none}
  .stp.done::before{background:var(--ok)}
  .stp .t b{font-size:14px;display:block}.stp .t span{font-size:11.5px;color:var(--muted)}
  .doc{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--line)}.doc:last-child{border:none}
  .doc .e{width:34px;height:34px;border-radius:9px;background:color-mix(in srgb,var(--accent) 11%,transparent);display:grid;place-items:center;font-size:16px;flex:0 0 auto}
  .doc .i{flex:1}.doc .i b{font-size:13px;display:block}.doc .i span{font-size:11px;color:var(--muted)}
  .doc .dl{font-size:13px;color:var(--accent);font-weight:700;padding:0 6px}
  .pay{text-align:center}
  .pay .ring{position:relative;width:120px;height:120px;margin:4px auto 10px}
  .pay .ring svg{width:120px;height:120px;transform:rotate(-90deg)}
  .pay .ring .c{position:absolute;inset:0;display:grid;place-items:center;text-align:center}
  .pay .ring .c b{font-family:var(--display);font-weight:800;font-size:24px;line-height:1}.pay .ring .c span{font-size:10px;color:var(--muted)}
  .pay .det{font-size:12.5px;color:var(--muted);margin-bottom:6px}.pay .det b{color:var(--ink);font-family:var(--mono)}
  .btn{height:48px;border-radius:12px;font-weight:700;font-size:14px;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px}
  .btn-p{background:var(--accent);color:#fff}.btn-wa{background:var(--wa);color:#fff}.btn-wa svg{width:17px;height:17px;fill:#fff}
  .credit{text-align:center;font-size:12px;color:var(--muted);margin-top:6px}
</style>
</head>
<body>
<div class="shell">
  <div class="top">
    <div class="logo"><div class="m" id="lm">A</div><div><b id="bl">Acceso</b><span>Portal de cliente · demo</span></div></div>
    <div class="controls"><input class="ti" id="ib" value="Acceso" maxlength="16"><div class="swatches" id="sw"></div></div>
  </div>

  <div class="welcome"><div class="hi">Hola, Camila 👋</div><h1 id="bizName">Tu proyecto con Acceso</h1></div>

  <div class="grid">
    <div>
      <div class="panel"><div class="ph">Estado del proyecto</div><div class="pb"><div class="steps" id="steps"></div></div></div>
      <div class="panel"><div class="ph">Tus documentos</div><div class="pb" id="docs"></div></div>
    </div>
    <div>
      <div class="panel"><div class="ph">Estado de pago</div><div class="pb pay">
        <div class="ring"><svg viewBox="0 0 120 120"><circle cx="60" cy="60" r="50" fill="none" stroke="var(--line)" stroke-width="11"/><circle cx="60" cy="60" r="50" fill="none" stroke="var(--accent)" stroke-width="11" stroke-linecap="round" stroke-dasharray="314" stroke-dashoffset="157" style="transition:stroke-dashoffset .8s"/></svg><div class="c"><b>50%</b><span>pagado</span></div></div>
        <div class="det">Anticipo: <b>$240.000</b> ✓</div>
        <div class="det">Saldo a la entrega: <b>$240.000</b></div>
        <button class="btn btn-p" id="pay">Pagar saldo</button>
        <button class="btn btn-wa" id="wa"><svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 00-8.6 15l-1.4 5 5.2-1.4A10 10 0 1012 2z"/></svg> Hablar con mi ejecutivo</button>
      </div></div>
    </div>
  </div>
  <div class="credit">Demo interactiva · solución re-skineable · proyecto de ejemplo</div>
</div>

<script>
(function(){
  "use strict";
  function $(s){return document.querySelector(s);}
  var brand="Acceso";
  var steps=[
    {t:"Propuesta aprobada",s:"12 jun",st:"done"},
    {t:"Anticipo recibido (50%)",s:"13 jun",st:"done"},
    {t:"En desarrollo",s:"En curso · 70%",st:"cur"},
    {t:"Revisión y ajuste",s:"Pendiente",st:""},
    {t:"Entrega final",s:"Pendiente",st:""}
  ];
  var docs=[["📄","Propuesta firmada","PDF · 240 KB"],["🧾","Comprobante anticipo","PDF · 88 KB"],["📐","Avance de diseño","Link · actualizado hoy"]];

  function render(){
    $("#steps").innerHTML=steps.map(function(s){return '<div class="stp '+s.st+'"><div class="dot">'+(s.st==="done"?"✓":s.st==="cur"?"•":"")+'</div><div class="t"><b>'+s.t+'</b><span>'+s.s+'</span></div></div>';}).join("");
    $("#docs").innerHTML=docs.map(function(d){return '<div class="doc"><span class="e">'+d[0]+'</span><div class="i"><b>'+d[1]+'</b><span>'+d[2]+'</span></div><button class="dl">↓</button></div>';}).join("");
  }
  $("#pay").onclick=function(){window.open("https://wa.me/?text="+encodeURIComponent("Hola "+brand+", quiero pagar el saldo de mi proyecto."),"_blank");};
  $("#wa").onclick=function(){window.open("https://wa.me/?text="+encodeURIComponent("Hola "+brand+", soy Camila y quiero hablar sobre mi proyecto."),"_blank");};

  var SW=[{c:"#0F766E",c2:"#14B8A6"},{c:"#2563EB",c2:"#5B8DEF"},{c:"#7C3AED",c2:"#A855F7"},{c:"#C2410C",c2:"#EA7A3C"},{c:"#16161A",c2:"#444"}];
  function ac(o){document.documentElement.style.setProperty("--accent",o.c);document.documentElement.style.setProperty("--accent-2",o.c2);
    var h=o.c.replace("#",""),r=parseInt(h.substr(0,2),16),g=parseInt(h.substr(2,2),16),b=parseInt(h.substr(4,2),16);
    document.documentElement.style.setProperty("--accent-ink",(0.299*r+0.587*g+0.114*b)>150?"#121A19":"#fff");
    [].slice.call(document.querySelectorAll(".sw")).forEach(function(e){e.classList.toggle("active",e.dataset.c===o.c);});}
  function bsw(){var s=$("#sw");s.innerHTML="";SW.forEach(function(o){var b=document.createElement("button");b.className="sw";b.style.background=o.c;b.dataset.c=o.c;b.onclick=function(){ac(o);};s.appendChild(b);});}
  function ab(n){brand=n||"Marca";$("#bl").textContent=brand;$("#lm").textContent=brand.charAt(0).toUpperCase();$("#bizName").textContent="Tu proyecto con "+brand;}
  $("#ib").addEventListener("input",function(e){ab(e.target.value);});
  bsw();ac(SW[0]);ab("Acceso");render();
})();
</script>
</body>
</html>
